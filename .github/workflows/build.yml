name: Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "目标分支/标签/提交"
        required: true
        default: "main"
      create_release:
        description: "自动创建发布草稿"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check_version.outputs.version }}
      app_name: ${{ steps.app_meta.outputs.app_name }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Check Version
        id: check_version
        shell: bash
        run: |
          version="$(tr -d '\r\n' < version.txt)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve App Meta
        id: app_meta
        shell: bash
        run: |
          echo "app_name=LinguaGacha" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: prepare
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Sync Manifest Versions
        shell: bash
        run: |
          version="${{ needs.prepare.outputs.version }}"
          uv version "$version" --frozen --no-sync
          npm --prefix frontend version "$version" --no-git-tag-version --allow-same-version

      - name: Sync Python Dependencies
        shell: bash
        run: |
          uv sync --extra build

      - name: Build Core
        shell: bash
        run: |
          uv run python ./buildtools/build_core.py

      - name: Stage Core For Electron
        shell: bash
        run: |
          cp -f "dist/core/core.exe" "core.exe"
          rm -rf "_internal"
          cp -R "dist/core/_internal" "_internal"

      - name: Install Frontend Dependencies
        shell: bash
        run: |
          npm --prefix frontend install

      - name: Build Electron Installer
        shell: bash
        run: |
          npm --prefix frontend run build -- --publish never

      - name: Generate Windows Installer SHA256
        shell: bash
        run: |
          version="${{ needs.prepare.outputs.version }}"
          installer="$(find "frontend/release/${version}" -maxdepth 1 -type f -name '*Setup.exe' | head -n 1)"
          if [ -z "$installer" ]; then
            echo "ERROR: Windows installer not found"
            find frontend/release -type f || true
            exit 1
          fi
          sha256sum "$installer" > "$installer.sha256"

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ needs.prepare.outputs.app_name }}_${{ needs.prepare.outputs.version }}_Windows
          path: |
            frontend/release/${{ needs.prepare.outputs.version }}/*Setup.exe
            frontend/release/${{ needs.prepare.outputs.version }}/*Setup.exe.sha256

  create-release:
    needs: [prepare, build-windows]
    if: ${{ inputs.create_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: false

      - name: List Artifacts
        run: |
          find artifacts -type f

      - name: Create Release And Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: MANUAL_BUILD_${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.app_name }}_${{ needs.prepare.outputs.version }}
          draft: true
          prerelease: false
          files: |
            ./artifacts/${{ needs.prepare.outputs.app_name }}_${{ needs.prepare.outputs.version }}_Windows/*Setup.exe
            ./artifacts/${{ needs.prepare.outputs.app_name }}_${{ needs.prepare.outputs.version }}_Windows/*Setup.exe.sha256
