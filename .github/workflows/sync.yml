name: Sync

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "源分支/标签/提交"
        required: true
        default: "main"
      target_repo:
        description: "目标仓库"
        required: true
        default: "neavo/KeywordGacha"
      target_branch:
        description: "目标分支/标签/提交"
        required: true
        default: "main"
      trigger_brand:
        description: "是否自动触发后续工作流"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  sync-kg-main:
    if: github.repository == 'neavo/LinguaGacha'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Requested Ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Configure GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.CI_SYNC_TOKEN }}
        run: |
          gh auth status
          gh auth setup-git

      - name: Push Source Tree To KG With Force-With-Lease
        env:
          GH_TOKEN: ${{ secrets.CI_SYNC_TOKEN }}
          TARGET_REPO: ${{ inputs.target_repo }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          OLD_SHA=$(git ls-remote "https://github.com/${TARGET_REPO}.git" "refs/heads/${TARGET_BRANCH}" | cut -f1)
          if [ -n "${OLD_SHA}" ]; then
            git push "https://github.com/${TARGET_REPO}.git" "HEAD:refs/heads/${TARGET_BRANCH}" --force-with-lease="refs/heads/${TARGET_BRANCH}:${OLD_SHA}"
          else
            git push "https://github.com/${TARGET_REPO}.git" "HEAD:refs/heads/${TARGET_BRANCH}"
          fi

      - name: Trigger KG Brand Workflow
        if: ${{ inputs.trigger_brand == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.CI_SYNC_TOKEN }}
          TARGET_REPO: ${{ inputs.target_repo }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          gh workflow run brand.yml --repo "${TARGET_REPO}" --ref "${TARGET_BRANCH}" -f branch="${TARGET_BRANCH}"
