interface:
  display_name: "Project Tests"
  short_description: "跨 Python 与 TypeScript 的行为测试工作流"
  default_prompt: "使用 $project-tests 处理测试任务：新增测试时，先确认被测行为、边界和业务文件到测试文件的一一映射，再编写行为优先的测试，禁止为同一业务文件创建多个平行测试文件；整理测试时，先审计路径与文件名映射关系，逐一判断每个用例是否仍能证明当前有效业务行为，宁缺毋滥地修改、合并或清理孤儿用例、凑数用例、虽有引用但实际业务不再触达或基本不可能触达的用例；必要时可做业务透明重构以提升测试效果，但不得改变业务功能。"
