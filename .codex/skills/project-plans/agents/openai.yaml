interface:
  display_name: "Project Plans"
  short_description: "基于项目现实而不是猜测和预估创建实施计划"
  default_prompt: |
    使用 $project-plans 根据当前上下文，基于项目现实而不是猜测和预估创建实施计划，不要遗漏任何已对齐的需求细节
    使用 $project-plans 基于项目现实而不是猜测对计划文件进行审查和优化，直到你完全确定此计划已经足够合理与详实，不要遗漏任何已对齐的需求细节
    [PLAN.md](PLAN.md) 执行计划直至完成所有任务阶段、实现所有任务目标，然后清理计划文件，执行过程中如需更新文档则使用 $project-docs