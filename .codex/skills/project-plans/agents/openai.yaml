interface:
  display_name: Project Plans
  short_description: 基于项目现实而不是猜测和预估创建实施计划
  default_prompt: |
    使用 $project-plans 根据当前上下文，基于项目现实而不是猜测和预估，以“全局最优”而非“最小改动”原则创建实施计划，不要遗漏任何已对齐的需求细节
    使用 $project-plans 基于项目现实而不是猜测，以“全局最优”而非“最小改动”原则对计划文件进行审查和优化，直到你确定此计划可以完全的、正确的实现所有的任务阶段和任务目标
    [PLAN.md](PLAN.md) 以“全局最优”而非“最小改动”原则执行计划直至完成所有任务阶段、实现所有任务目标，然后清理计划文件，按 “每个类/每个方法/关键变量/关键逻辑” 的覆盖标准检查注释，执行过程中如需更新文档请使用 $project-docs