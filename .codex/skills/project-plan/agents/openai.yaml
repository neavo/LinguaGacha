interface:
  display_name: Project Plan
  short_description: 项目实施计划
  x_sample_prompt: |
    使用 $project-plan 根据当前上下文，基于项目事实而不是猜测创建实施计划，不要遗漏任何已对齐的需求细节，以 “全局最优而非最小改动” “勇于重构和删减，避免过度防御和补丁式修改” 为原则，未经用户确认不得引入兼容层
    /goal [PLAN.md](PLAN.md) 严格执行计划直至完成计划中列出的 **所有阶段和所有目标**，执行时同步按 “每个类/每个方法/关键变量/关键逻辑” 的标准检查变更文件的注释覆盖，最后清理计划文件，如需更新文档请使用 $project-doc，如需更新测试请使用 $project-test，以“全局最优而非最小改动” “勇于重构和删减，避免过度防御和补丁式修改” 为原则，未经用户确认不得引入兼容层，所有因变更产生的冗余逻辑和资源（包括兼容层）都应该同步清理
    以 “全局最优而非最小改动” “勇于重构和删减，避免过度防御和补丁式修改” 为原则设计最佳方案
    执行，未经用户确认不得引入兼容层，所有因变更产生的冗余逻辑和资源（包括兼容层）都应该同步清理
