interface:
  display_name: Project Plan
  short_description: 项目实施计划
  x_sample_prompt: |
    以 “全局最优而非最小改动” “重视维护成本，勇于重构和删减，避免过度设计、过度防御和补丁式修改” 为原则，最佳解决方案是什么
    检查所有尚未提交的文件中是否 “每个类/每个方法/关键变量/关键逻辑” 都有注释，测试文件与业务文件是否双向一一对应，如有缺失请补齐，例外：纯样式文件和配置、文档、本地化等资源文件一般无需注释和测试
    以 “全局最优而非最小改动” “重视维护成本，勇于重构和删减，避免过度设计、过度防御和补丁式修改” 为原则，检查当前的文档变更是否符合 $project-doc 的要求，特别是 “只保留无法从代码、目录、类型名、局部实现或现有权威文档直接看出的稳定事实”，宁缺毋滥
    使用 $project-plan 根据当前上下文，基于项目事实而不是猜测创建实施计划，不要遗漏任何已对齐的需求细节，以 “全局最优而非最小改动” “重视维护成本，勇于重构和删减，避免过度设计、过度防御和补丁式修改” 为原则，未经用户确认不得引入兼容层
    /goal 严格按 [PLAN.md](PLAN.md) 执行任务计划，持续推进直至完成其中定义的所有目标、步骤与验收项，执行过程中不得因阶段性完成、局部可用、实现困难或上下文较长而自行停止，只有在任务全部完成、遇到必须由用户确认的关键决策或外部阻塞导致无法继续推进时，才允许暂停并说明原因。以“全局最优而非最小改动” “重视维护成本，勇于重构和删减，避免过度设计、过度防御和补丁式修改” 为执行原则，未经用户确认不得引入兼容层，所有因变更产生的冗余逻辑和资源（包括兼容层）都应该同步清理，更新测试用例时使用 $project-test，在任务目标全部完成后再判断是否需要更新文档，如需更新则使用 $project-doc。