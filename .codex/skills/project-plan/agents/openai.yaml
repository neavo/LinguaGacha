interface:
  display_name: Project Plan
  short_description: 项目实施计划
  x_sample_prompt: |
    使用 $project-plan 根据当前上下文，基于项目事实而不是猜测创建实施计划，不要遗漏任何已对齐的需求细节，以 “全局最优而非最小改动” “勇于重构和删减，避免过度防御和补丁式修改” 为原则，未经用户确认不得引入兼容层
    /goal 严格执行计划直至完成 **所有目标和步骤**，如需更新文档请使用 $project-doc，如需更新测试请使用 $project-test，以“全局最优而非最小改动” “勇于重构和删减，避免过度防御和补丁式修改” 为原则，未经用户确认不得引入兼容层，所有因变更产生的冗余逻辑和资源（包括兼容层）都应该同步清理
    以 “全局最优而非最小改动” “勇于重构和删减，避免过度防御和补丁式修改” 为原则，最佳解决方案是什么
    检查所有尚未提交的文件中是否 “每个类/每个方法/关键变量/关键逻辑” 都有注释，测试文件与业务文件是否一一对应，如有缺失请补齐，配置、文档和本地化资源无需检查
    以 “全局最优而非最小改动” “勇于重构和删减，避免过度防御和补丁式修改” 为原则，检查当前的文档变更是否符合 $project-doc 的要求，特别是 “核心原则” 节的要求：优先删除、合并、迁移和压缩，只有证据充分且会影响未来维护判断时才补写；写给未来任务使用，不记录本轮过程、历史迁移、临时方案、阶段性计划或“为什么这次这么改”；只保留无法从代码、目录、类型名、局部实现或现有权威文档直接看出的稳定事实；用当前有效系统边界组织内容，不沿用过期目录名、旧实现叙事或临时过渡口径；同一业务语义只允许一个权威来源，其它位置只保留必要引用或删除。